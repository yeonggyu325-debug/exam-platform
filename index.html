<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>exam-platform.html</title>
<style>
:root {
  --bg: #f3f6fb;
  --panel: #ffffff;
  --panel-2: #f7faff;
  --text: #172033;
  --muted: #64748b;
  --line: #dbe3ef;
  --primary: #1f5fbf;
  --primary-dark: #174a9c;
  --danger: #c2410c;
  --danger-bg: #fff7ed;
  --success: #15803d;
  --success-bg: #f0fdf4;
  --warning: #a16207;
  --warning-bg: #fefce8;
  --shadow: 0 12px 30px rgba(15, 23, 42, .08);
  --radius: 16px;
  --focus: 0 0 0 4px rgba(31, 95, 191, .18);
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --color-surface: var(--panel);
  --color-surface-offset: var(--panel-2);
  --color-border: var(--line);
  --color-text: var(--text);
  --color-text-muted: var(--muted);
  --color-text-faint: #94a3b8;
  --color-error: var(--danger);
  --radius-md: 12px;
  --radius-lg: 16px;
  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --content-wide: 1180px;
  --shadow-sm: 0 4px 12px rgba(15, 23, 42, .08);
}

[data-theme="dark"] {
  --bg: #0f172a;
  --panel: #162033;
  --panel-2: #111827;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --line: #334155;
  --primary: #7aa2ff;
  --primary-dark: #9bb8ff;
  --danger: #fb923c;
  --danger-bg: #2a170c;
  --success: #4ade80;
  --success-bg: #102416;
  --warning: #facc15;
  --warning-bg: #2a2308;
  --shadow: 0 12px 30px rgba(0, 0, 0, .28);
  --focus: 0 0 0 4px rgba(122, 162, 255, .22);
  --color-text-faint: #64748b;
  --shadow-sm: 0 4px 12px rgba(0, 0, 0, .25);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  line-height: 1.5;
}

button, input, select, textarea { font: inherit; }
button, a, input, select, textarea { outline: none; }

button:focus-visible,
a:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  box-shadow: var(--focus);
  border-color: var(--primary);
}

button:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none !important;
}

.app-shell { min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
}

.brand { display: flex; align-items: center; gap: 12px; min-width: 0; }

.brand-mark {
  width: 38px; height: 38px;
  border-radius: 12px;
  display: grid; place-items: center;
  background: var(--primary);
  color: #fff;
  font-weight: 900;
  letter-spacing: -.04em;
  flex: none;
}

.brand h1 { margin: 0; font-size: 17px; line-height: 1.2; }
.brand p  { margin: 2px 0 0; color: var(--muted); font-size: 13px; }

.top-actions {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; flex-wrap: wrap;
}

/* ── Buttons ── */
.btn {
  min-height: 40px;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 9px 13px;
  background: var(--panel);
  color: var(--text);
  font-weight: 800;
  cursor: pointer;
  transition: .15s ease;
  text-decoration: none;
}
.btn:hover { transform: translateY(-1px); border-color: var(--primary); }
.btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn.primary:hover { background: var(--primary-dark); }
.btn.danger  { color: var(--danger);  border-color: rgba(194,65,12,.35); background: var(--danger-bg); }
.btn.success { color: var(--success); border-color: rgba(21,128,61,.35);  background: var(--success-bg); }
.btn.small   { min-height: 32px; padding: 6px 10px; border-radius: 10px; font-size: 13px; }

/* ── Layout ── */
.container {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0 44px;
}

/* ── Login ── */
.login-wrap {
  min-height: calc(100vh - 64px);
  display: grid; place-items: center;
  padding: 32px 16px;
}
.login-card {
  width: min(460px, 100%);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 30px;
}
.login-card h2  { margin: 0 0 8px; font-size: 25px; }
.login-card .hint { margin: 0 0 24px; color: var(--muted); }

/* ── Form ── */
.field { margin-bottom: 16px; }
label  { display: block; margin: 0 0 7px; font-size: 14px; font-weight: 900; }
input, select, textarea {
  width: 100%; min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 12px;
  background: var(--panel);
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; line-height: 1.6; }
.question-form { display: grid; grid-template-columns: 1fr; gap: 14px; }
.question-form .option-field input { width: 100%; min-height: 48px; padding: 12px 14px; line-height: 1.6; }
.form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }

/* ── Notice ── */
.notice {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 13px 14px;
  background: var(--panel-2);
  color: var(--muted);
}
.notice.danger  { color: var(--danger);  background: var(--danger-bg);  border-color: rgba(194,65,12,.25); }
.notice.success { color: var(--success); background: var(--success-bg); border-color: rgba(21,128,61,.25); }
.notice.warning { color: var(--warning); background: var(--warning-bg); border-color: rgba(161,98,7,.25); }

/* ── Utilities ── */
.muted      { color: var(--muted); }
.text-right { text-align: right; }
.hidden     { display: none !important; }

/* ── Card ── */
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
}
.section-head {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  gap: 16px; margin-bottom: 16px;
}
.section-head h2, .section-head h3 { margin: 0; }
.section-head p { margin: 4px 0 0; color: var(--muted); }

/* ── Grid ── */
.grid { display: grid; gap: 16px; }
.grid.two   { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid.four  { grid-template-columns: repeat(4, minmax(0, 1fr)); }

/* ── Metric ── */
.metric {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
}
.metric .label { color: var(--muted); font-size: 13px; font-weight: 900; }
.metric .value { margin-top: 6px; font-size: 28px; font-weight: 950; letter-spacing: -.03em; }
.metric .sub   { margin-top: 4px; color: var(--muted); font-size: 12px; }

/* ── Profile list ── */
.profile-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px; margin: 0;
}
.profile-list div { border: 1px solid var(--line); border-radius: 13px; padding: 12px; background: var(--panel-2); }
.profile-list dt  { color: var(--muted); font-size: 12px; font-weight: 900; }
.profile-list dd  { margin: 4px 0 0; font-weight: 950; }

/* ── Badge ── */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 10px;
  background: var(--panel-2);
  color: var(--text);
  font-size: 12px; font-weight: 950; white-space: nowrap;
}
.badge.admin   { background: #111827; border-color: #111827; color: #fff; }
[data-theme="dark"] .badge.admin { background: #e5e7eb; color: #111827; }
.badge.success { color: var(--success); background: var(--success-bg); border-color: rgba(21,128,61,.25); }
.badge.danger  { color: var(--danger);  background: var(--danger-bg);  border-color: rgba(194,65,12,.25); }
.badge.warning { color: var(--warning); background: var(--warning-bg); border-color: rgba(161,98,7,.25); }

/* ── Exam ── */
.exam-layout { display: grid; grid-template-columns: 1fr 290px; gap: 18px; align-items: start; }
.question-title { margin: 0 0 16px; font-size: 21px; font-weight: 950; }
.option {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 10px; padding: 13px;
  border: 1px solid var(--line); border-radius: 14px;
  background: var(--panel); cursor: pointer; transition: .12s ease;
}
.option:hover    { border-color: var(--primary); background: var(--panel-2); }
.option input    { width: auto; min-height: auto; margin-top: 4px; }
.progress        { height: 10px; border-radius: 999px; background: var(--line); overflow: hidden; }
.progress span   { display: block; height: 100%; width: 0; border-radius: inherit; background: var(--primary); transition: width .2s ease; }

/* ── Admin ── */
.admin-layout {
  display: grid;
  grid-template-columns: 250px minmax(0, 1fr);
  min-height: calc(100vh - 64px);
}
.sidebar {
  position: sticky; top: 64px;
  height: calc(100vh - 64px);
  overflow: auto;
  border-right: 1px solid var(--line);
  background: var(--panel);
  padding: 18px;
}
.sidebar nav { display: grid; gap: 8px; margin-top: 18px; }
.nav-btn { width: 100%; justify-content: flex-start; border-color: transparent; background: transparent; color: var(--muted); text-align: left; }
.nav-btn.active { border-color: var(--line); background: var(--panel-2); color: var(--primary); }
.admin-main { min-width: 0; padding: 24px; }

/* ── Table ── */
.table-wrap { width: 100%; overflow: auto; border: 1px solid var(--line); border-radius: 14px; background: var(--panel); }
table       { width: 100%; min-width: 780px; border-collapse: collapse; }
th, td      { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 14px; }
th          { background: var(--panel-2); color: var(--muted); font-size: 12px; font-weight: 950; text-transform: uppercase; letter-spacing: .02em; white-space: nowrap; }
tr:last-child td { border-bottom: 0; }

/* ── Filters ── */
.filters { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 14px; }
/* 관리자 입력폼 정렬 보정 */
.admin-inline-form {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: end;
}
.admin-inline-form .field { margin-bottom: 0; }
.admin-inline-form .btn { min-height: 42px; align-self: end; white-space: nowrap; }
.admin-main .filters { align-items: end; }
.admin-main .filters .field { margin-bottom: 0; }
.admin-main .filters > .btn { min-height: 42px; align-self: end; white-space: nowrap; }
.admin-main .form-grid { align-items: end; }
.admin-main .form-grid .field { margin-bottom: 0; }
.admin-main .form-grid > .btn { min-height: 42px; align-self: end; white-space: nowrap; }
@media (max-width: 640px) {
  .admin-inline-form { grid-template-columns: 1fr; }
  .admin-inline-form .btn,
  .admin-main .filters > .btn,
  .admin-main .form-grid > .btn { width: 100%; }
}


/* ── Bar chart ── */
.bar-chart { display: grid; gap: 10px; }
.bar-row   { display: grid; grid-template-columns: 120px 1fr 54px; gap: 10px; align-items: center; font-size: 13px; }
.bar-track { height: 14px; border-radius: 999px; background: var(--line); overflow: hidden; }
.bar-fill  { height: 100%; border-radius: inherit; background: var(--primary); }

/* ── Modal ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  display: grid; place-items: center; padding: 18px;
  background: rgba(15, 23, 42, .55);
}
.modal {
  width: min(760px, 100%);
  max-height: calc(100vh - 36px); overflow: auto;
  border: 1px solid var(--line); border-radius: 20px;
  box-shadow: var(--shadow); background: var(--panel); padding: 20px;
}
.modal.sm     { width: min(480px, 100%); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; flex-wrap: wrap; }

/* ── Misc ── */
.empty  { padding: 30px; color: var(--muted); text-align: center; }
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ── Responsive ── */
@media (max-width: 1000px) {
  .grid.four, .grid.three { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .exam-layout, .admin-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
  .sidebar nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .admin-main { padding: 18px; }
  .filters { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 640px) {
  .topbar { padding: 12px 16px; align-items: flex-start; }
  .brand h1 { font-size: 15px; }
  .brand p  { display: none; }
  .container { width: min(100% - 24px, 1180px); padding-top: 18px; }
  .login-card { padding: 22px; }
  .grid.two, .grid.three, .grid.four, .profile-list, .form-grid, .filters { grid-template-columns: 1fr; }
  .sidebar nav { grid-template-columns: 1fr 1fr; }
  .section-head { display: grid; }
  .btn { width: 100%; }
  .top-actions .btn { width: auto; }
  .bar-row { grid-template-columns: 88px 1fr 42px; }
}


    /* ── 응시자 프로필 바 ── */
    .profile-bar {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-6);
      flex-wrap: wrap;
    }
    .profile-bar-item { display: flex; align-items: center; gap: var(--space-2); }
    .profile-bar-label { font-size: var(--text-xs); color: var(--color-text-muted); }
    .profile-bar-value { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
    .profile-bar-sep { color: var(--color-text-faint); font-size: var(--text-sm); }
    .profile-bar-badge { margin-left: auto; }

    /* ── 시험 안내 설명 ── */
    .exam-intro-desc {
      background: var(--color-surface-offset);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.8;
      margin-bottom: var(--space-4);
    }
    .exam-intro-desc strong { color: var(--color-text); font-weight: 600; }

    /* ── 시험 sticky 상태바 ── */
    .exam-sticky-bar {
      position: sticky;
      top: 64px;
      z-index: 45;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
    }
    .exam-sticky-inner {
      max-width: var(--content-wide);
      margin-inline: auto;
      padding: var(--space-2) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .exam-sticky-left { flex: 1; min-width: 0; }
    .exam-sticky-right { display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0; }
    .exam-stat { font-size: var(--text-xs); color: var(--color-text-muted); white-space: nowrap; }
    .exam-warn-text { font-size: var(--text-xs); color: var(--color-text-muted); }
    .exam-warn-text.danger { color: var(--color-error); font-weight: 600; }

    /* ── 전체 문항 목록 ── */
    .exam-all-container { padding-block: var(--space-4); }
    .exam-progress-wrap { margin-bottom: var(--space-4); }
    .question-block { margin-bottom: var(--space-4); scroll-margin-top: 60px; }
    .question-block .question-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }
    .question-block .question-num {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-weight: 600;
    }
    .question-block .question-title {
      font-size: var(--text-base);
      font-weight: 600;
      margin-bottom: var(--space-3);
      line-height: 1.5;
    }
  

/* 요청 반영: 로고, 안내문, 최근 기록, 분기별 결과 */
.brand-logo {
  width: auto;
  height: 38px;
  max-width: 150px;
  display: block;
  object-fit: contain;
  flex: none;
}
.exam-ready-card {
  overflow: hidden;
  border: 1px solid rgba(31,95,191,.24);
  border-radius: 24px;
  background:
    radial-gradient(circle at top left, rgba(31,95,191,.16), transparent 36%),
    var(--panel);
  box-shadow: 0 18px 44px rgba(15, 42, 86, .12);
}
.exam-ready-hero {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 18px;
  align-items: center;
  padding: 26px 28px;
  margin: -4px -4px 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, #0f357a, #1f5fbf 58%, #3a7be0);
  color: #fff;
}
.exam-ready-icon {
  width: 58px;
  height: 58px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  background: rgba(255,255,255,.16);
  border: 1px solid rgba(255,255,255,.32);
  font-size: 27px;
  font-weight: 950;
  animation: bluePulse 1.35s ease-in-out infinite;
}
.exam-ready-hero h2 {
  margin: 0;
  font-size: clamp(25px, 3.5vw, 36px);
  letter-spacing: -.04em;
}
.exam-ready-hero p { display: none; }
@keyframes bluePulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.38); transform: scale(1); }
  50% { box-shadow: 0 0 0 10px rgba(255,255,255,.08); transform: scale(1.035); }
}
.exam-intro-desc.business-blue {
  background: #f8fbff;
  border: 1px solid rgba(31,95,191,.16);
  border-radius: 20px;
  padding: 18px;
  color: #26364d;
}
[data-theme="dark"] .exam-intro-desc.business-blue {
  background: rgba(17, 24, 39, .72);
  color: var(--text);
}
.intro-policy-text p { margin: 0; }
.exam-rule-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin: 0 0 14px;
}
.exam-rule-item, .exam-policy-item {
  padding: 15px 16px;
  border: 1px solid rgba(31,95,191,.16);
  border-radius: 16px;
  background: #fff;
  line-height: 1.65;
}
[data-theme="dark"] .exam-rule-item,
[data-theme="dark"] .exam-policy-item { background: rgba(22, 32, 51, .95); }
.exam-rule-item strong, .exam-policy-item strong {
  display: block;
  color: var(--primary);
  margin-bottom: 4px;
  font-size: 14px;
}
.exam-policy-list { display: grid; gap: 10px; margin-top: 10px; }
.exam-policy-item {
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: 12px;
  align-items: flex-start;
}
.exam-policy-mark {
  width: 34px;
  height: 34px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: rgba(31,95,191,.10);
  color: var(--primary);
  font-weight: 950;
}
.exam-security-note {
  margin-top: 10px;
  padding: 16px 18px;
  border: 1px solid rgba(194,65,12,.24);
  border-left: 5px solid var(--danger);
  border-radius: 16px;
  background: var(--danger-bg);
  color: var(--danger);
  font-weight: 900;
  line-height: 1.65;
}
.result-simple-card { text-align: center; padding: 28px; }
.result-final-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 220px;
  min-height: 110px;
  padding: 18px 28px;
  border-radius: 28px;
  font-size: clamp(54px, 10vw, 94px);
  line-height: 1;
  font-weight: 1000;
  letter-spacing: -.06em;
  animation: resultBlink 1.05s ease-in-out infinite;
}
.result-final-badge.success { color: var(--success); background: var(--success-bg); border: 2px solid rgba(21,128,61,.35); }
.result-final-badge.danger { color: var(--danger); background: var(--danger-bg); border: 2px solid rgba(194,65,12,.35); }
.result-simple-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  margin-top: 20px;
}
.result-simple-metric {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 20px;

// 순수 유틸리티 함수 모음 – 어떤 모듈에서도 참조 가능

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDateTime(iso) {
  if (!iso) return "-";
  return new Intl.DateTimeFormat("ko-KR", {
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit"
  }).format(new Date(iso));
}

function daysAgo(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toISOString();
}

function getCurrentQuarter(date = new Date()) {
  const year = date.getFullYear();
  const quarter = Math.floor(date.getMonth() / 3) + 1;
  return `${year}-Q${quarter}`;
}

function previousQuarter() {
  const now = new Date();
  const q = Math.floor(now.getMonth() / 3) + 1;
  return q === 1 ? `${now.getFullYear() - 1}-Q4` : `${now.getFullYear()}-Q${q - 1}`;
}

// 시드 기반 유사 난수 생성기 (mulberry32)
function _seededRng(seed) {
  let s = seed >>> 0;
  return function() {
    s += 0x6D2B79F5;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// examSeed: 시험 시작 시 설정 (startExam에서 세팅)
let _examSeed = 0;
let _examRng = null;

function _strHash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return h >>> 0;
}

function shuffleArray(array) {
  const copied = [...array];
  const rng = _examRng || (_examSeed ? _seededRng(_examSeed) : Math.random.bind(Math));
  for (let i = copied.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [copied[i], copied[j]] = [copied[j], copied[i]];
  }
  return copied;
}

function nextId(array, key) {
  return array.length ? Math.max(...array.map(item => Number(item[key]) || 0)) + 1 : 1;
}

function optionHtml(value, selected, label = value) {
  return `<option value="${escapeHtml(value)}" ${String(value) === String(selected) ? "selected" : ""}>${escapeHtml(label)}</option>`;
}

function getCandidateUsers() {
  return users.filter(user => user.role === "candidate");
}

function getDepartments() {
  return [...new Set(getCandidateUsers().map(user => user.department))].sort();
}

function getAffiliationTypeByDepartment(department) {
  const affil = managedAffiliations.find(a => (typeof a === "string" ? a : a.name) === department);
  if (!affil) return "이루자";
  return typeof affil === "string" ? "이루자" : (affil.type || "이루자");
}

function compareCandidateOrder(a, b) {
  const typeA = getAffiliationTypeByDepartment(a.department);
  const typeB = getAffiliationTypeByDepartment(b.department);

  const typeRank = { "이루자": 1, "협력사": 2 };
  const rankA = typeRank[typeA] || 99;
  const rankB = typeRank[typeB] || 99;

  if (rankA !== rankB) return rankA - rankB;

  const depCompare = String(a.department || "").localeCompare(String(b.department || ""), "ko");
  if (depCompare !== 0) return depCompare;

  return String(a.name || "").localeCompare(String(b.name || ""), "ko");
}

function getCategories() {
  return [...new Set(questionBank.map(q => q.category))].sort();
}

function getLatestResult(employeeId) {
  return examResults
    .filter(result => result.employeeId === employeeId)
    .sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt))[0];
}

function hasAttemptedThisQuarter(employeeId, quarter = getCurrentQuarter()) {
  return examResults.some(result => result.employeeId === employeeId && result.quarter === quarter);
}

function getQuotaWarnings() {
  return Object.entries(examSettings.categoryQuota)
    .filter(([category, count]) => questionBank.filter(q => q.active && q.category === category).length < Number(count))
    .map(([category, count]) =>
      `${category} 필요 ${count}문항 / 보유 ${questionBank.filter(q => q.active && q.category === category).length}문항`
    );
}

function getActiveExamKey(employeeId, quarter = getCurrentQuarter()) {
  return `${employeeId}__${quarter}`;
}

function getActiveExamRecord(employeeId, quarter = getCurrentQuarter()) {
  const key = getActiveExamKey(employeeId, quarter);
  return activeExams.find(item => item.key === key && item.status === "in_progress");
}

function upsertActiveExamRecord(exam, extra = {}) {
  if (!exam) return;

  const key = getActiveExamKey(exam.employeeId, exam.quarter);
  const currentUser = users.find(u => u.employeeId === exam.employeeId) || state.currentUser || {};

  const record = {
    key,
    employeeId: exam.employeeId,
    quarter: exam.quarter,
    department: currentUser.department || "",
    name: currentUser.name || "",
    status: "in_progress",
    updatedAt: new Date().toISOString(),
    startedAt: exam.startedAt || "",
    remainingSeconds: state.remainingSeconds,
    answeredCount: Array.isArray(exam.answers) ? exam.answers.filter(a => a !== null).length : 0,
    totalCount: Array.isArray(exam.questions) ? exam.questions.length : 0,
    tabSwitchCount: Number(exam.tabSwitchCount || 0),
    exam: JSON.parse(JSON.stringify(exam)),
    ...extra
  };

  const index = activeExams.findIndex(item => item.key === key);
  if (index >= 0) activeExams[index] = { ...activeExams[index], ...record };
  else activeExams.push(record);
}

function clearActiveExamRecord(employeeId, quarter = getCurrentQuarter()) {
  const key = getActiveExamKey(employeeId, quarter);
  activeExams = activeExams.filter(item => item.key !== key);
}

function persistCurrentExam(saveRemote = true) {
  if (!state.currentExam) return;
  upsertActiveExamRecord(state.currentExam);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ users, questionBank, examSettings, examResults, activityLogs, activeExams, managedAffiliations }));
  } catch (error) {
    console.warn("진행 중 시험 저장에 실패했습니다.", error);
  }
  if (saveRemote) queueRemoteSave();
}

function mergeLocalActiveExams() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const localData = JSON.parse(raw);
    if (!Array.isArray(localData.activeExams)) return;
    localData.activeExams.forEach(localRecord => {
      if (!localRecord?.key || localRecord.status !== "in_progress") return;
      const remoteIndex = activeExams.findIndex(item => item.key === localRecord.key);
      const remoteRecord = remoteIndex >= 0 ? activeExams[remoteIndex] : null;
      const localTime = new Date(localRecord.updatedAt || 0).getTime();
      const remoteTime = new Date(remoteRecord?.updatedAt || 0).getTime();
      if (!remoteRecord || localTime >= remoteTime) {
        if (remoteIndex >= 0) activeExams[remoteIndex] = localRecord;
        else activeExams.push(localRecord);
      }
    });
  } catch (error) {
    console.warn("진행 중 시험 로컬 병합에 실패했습니다.", error);
  }
}


const STORAGE_KEY = "hniruja_exam_platform_v2";

function isAppsScriptRuntime() {
  return typeof google !== "undefined" && google.script && google.script.run;
}

function getExternalApiBase() {
  if (isAppsScriptRuntime()) return "";
  if (window.HNIRUJA_API_BASE) return String(window.HNIRUJA_API_BASE);
  if (location.protocol === "http:" || location.protocol === "https:") return "/api/gas";
  return "";
}

function isExternalApiRuntime() {
  return Boolean(getExternalApiBase());
}

async function callExternalApi(action, payload = {}) {
  const base = getExternalApiBase();
  if (!base) throw new Error("외부 API 주소가 설정되지 않았습니다.");
  const response = await fetch(base, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action, payload })
  });
  if (!response.ok) throw new Error(`API 요청 실패: ${response.status}`);
  const data = await response.json();
  if (data && data.ok === false) throw new Error(data.message || "API 처리 실패");
  return data && Object.prototype.hasOwnProperty.call(data, "data") ? data.data : data;
}

function applyRemoteData(data) {
  if (data && Array.isArray(data.users)) users = data.users;
  if (data && Array.isArray(data.questionBank)) questionBank = data.questionBank;
  if (data && data.examSettings) {
    examSettings = { ...examSettings, ...data.examSettings };
  }
  if (data && Array.isArray(data.examResults)) examResults = data.examResults;
  if (data && Array.isArray(data.activityLogs)) activityLogs = data.activityLogs;
  if (data && Array.isArray(data.activeExams)) activeExams = data.activeExams;
  if (data && Array.isArray(data.managedAffiliations)) {
    managedAffiliations = data.managedAffiliations.map(a =>
      typeof a === 'string' ? { name: a, type: '이루자' } : a
    );
  }
  mergeLocalActiveExams();
  // 서버 데이터로 로컬캐시 즉시 덮어쓰기 (다음 로드 시 최신 상태 유지)
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const base = raw ? JSON.parse(raw) : {};
    base.examResults  = examResults;
    base.activeExams  = activeExams;
    base.activityLogs = activityLogs;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(base));
  } catch(e) {}
  state._remoteLoaded = true;
}

function loadRemoteData(done) {
  if (isAppsScriptRuntime()) {
    google.script.run
      .withSuccessHandler(data => {
        try { applyRemoteData(data); done(true); }
        catch (error) { console.warn("스프레드시트 데이터 복원에 실패했습니다.", error); done(false); }
      })
      .withFailureHandler(error => {
        console.warn("스프레드시트 연결에 실패했습니다. 브라우저 저장소로 전환합니다.", error);
        loadPersistentData();
        done(false);
      })
      .getAppData();
    return;
  }

  if (isExternalApiRuntime()) {
    callExternalApi("getAppData")
      .then(data => { applyRemoteData(data); done(true); })
      .catch(error => {
        console.warn("외부 API 연결에 실패했습니다. 브라우저 저장소로 전환합니다.", error);
        loadPersistentData();
        done(false);
      });
    return;
  }

  done(false);
}

function queueRemoteSave() {
  const snapshot = { users, questionBank, examSettings, examResults, activityLogs, activeExams, managedAffiliations };
  if (isAppsScriptRuntime()) {
    google.script.run
      .withFailureHandler(error => console.warn("스프레드시트 저장에 실패했습니다.", error))
      .saveAppData(snapshot);
    return;
  }
  if (isExternalApiRuntime()) {
    callExternalApi("saveAppData", snapshot)
      .catch(error => console.warn("외부 API 저장에 실패했습니다.", error));
  }
}

function appendResultToSheet(result, log) {
  if (isAppsScriptRuntime()) {
    google.script.run
      .withFailureHandler(error => console.warn("응시 결과 스프레드시트 기록에 실패했습니다.", error))
      .appendExamSubmission(result, log);
    return;
  }
  if (isExternalApiRuntime()) {
    callExternalApi("appendExamSubmission", { result, log })
      .catch(error => console.warn("응시 결과 외부 API 기록에 실패했습니다.", error));
  }
}

function affiliationOptions(selected = "") {
  return managedAffiliations.map(dep => optionHtml(dep, selected)).join("");
}

function savePersistentData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ users, questionBank, examSettings, examResults, activityLogs, activeExams, managedAffiliations }));
  } catch (error) {
    console.warn("저장소 기록에 실패했습니다.", error);
  }
  queueRemoteSave();
}

function loadPersistentData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (Array.isArray(data.users)) users = data.users;
    if (Array.isArray(data.questionBank)) questionBank = data.questionBank;
    if (data.examSettings) examSettings = { ...examSettings, ...data.examSettings };
    if (Array.isArray(data.examResults)) examResults = data.examResults;
    if (Array.isArray(data.activityLogs)) activityLogs = data.activityLogs;
    if (Array.isArray(data.activeExams)) activeExams = data.activeExams;
    if (Array.isArray(data.managedAffiliations)) managedAffiliations = data.managedAffiliations;
    return true;
  } catch (error) {
    console.warn("저장소 복원에 실패했습니다.", error);
    return false;
  }
}

function formatDateOnly(iso) {
  if (!iso) return "-";
  return new Intl.DateTimeFormat("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit" }).format(new Date(iso));
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function getCertificationValidity(result) {
  if (!result || !result.passed || result.disqualified) return null;
  const validFrom = result.validFrom || addDays(new Date(result.submittedAt), 1).toISOString();
  const until = result.validUntil ? new Date(result.validUntil) : addDays(new Date(validFrom), 365);
  if (!result.validUntil) until.setDate(until.getDate() - 1);
  return { validFrom, validUntil: result.validUntil || until.toISOString() };
}

function getResultComment(result) {
  if (result.disqualified) return "응시하느라 고생 많으셨습니다. 실격 처리되어 다음 분기 안전담당자 시험에 다시 응시바랍니다.";
  if (result.passed) return "응시하느라 고생 많으셨습니다. 앞으로 현장안전을 위해 힘써주시기 바랍니다.";

}

function handleLogin(event) {
  event.preventDefault();
  const form       = new FormData(event.currentTarget);
  const department = String(form.get("department") || "").trim();
  const name       = String(form.get("name") || "").trim();

  if (name === "ehs1985") {
    const admin = users.find(user => user.role === "admin") || { employeeId: "ADM-0001", department: "환경안전", name: "ehs1985", role: "admin" };
    state.currentUser = admin;
    state.view        = "admin";
    state.loginError  = "";
    render();
    return;
  }

  if (!department) {
    state.loginError = "응시자는 소속을 선택해야 합니다.";
    renderLogin();
    return;
  }

  const candidate = users.find(user => user.role === "candidate" && user.department === department && user.name === name);
  if (candidate) {
    state.currentUser = candidate;
    state.loginError  = "";

    // 시험 진행 중이면 로컬로 즉시 복원 (타이머 연속성)
    const activeRec = getActiveExamRecord(candidate.employeeId);
    if (activeRec?.exam) {
      state.currentExam          = activeRec.exam;
      const savedRemaining       = Number(activeRec.remainingSeconds || examSettings.timeLimitMinutes * 60);
      const savedAt              = activeRec.updatedAt ? new Date(activeRec.updatedAt).getTime() : Date.now();
      const elapsedSecs          = Math.floor((Date.now() - savedAt) / 1000);
      state.remainingSeconds     = Math.max(1, savedRemaining - elapsedSecs);
      state.currentQuestionIndex = 0;
      state.lastResult           = null;
      state.isSubmitting         = false;
      state.view                 = "exam";
      if (state.currentExam.tabSwitchCount >= examSettings.tabSwitchLimit) {
        state.currentExam.disqualified = true;
        state.currentExam.disqualificationReason = `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
        submitExam(true, true, `재접속 전 이탈 누적 ${state.currentExam.tabSwitchCount}회로 자동 제출 및 실격`);
      } else {
        renderExamScreen();
        startTimer();
      }
      return;
    }

    // 시험 진행 중이 아니면 → 반드시 서버 데이터 먼저 확인 후 화면 결정
    if (isAppsScriptRuntime() || isExternalApiRuntime()) {
      // 로딩 중 표시
      app.innerHTML = `<div style="min-height:calc(100vh - 64px);display:grid;place-items:center;color:var(--muted);font-size:15px">응시 정보를 확인하는 중입니다…</div>`;
      loadRemoteData(() => {
        setTimeout(() => _resolveAfterServerLoad(candidate), 100);
      });
    } else {
      _resolveAfterServerLoad(candidate);
    }
    return;
  }

  state.loginError = "등록된 응시자 정보와 일치하지 않습니다. 소속과 성명을 다시 확인하세요.";
  renderLogin();
}

    state.lastResult = currentQuarterResult;

    render();
    return;
  }
  state.lastResult = null;
  state.view = "candidate";
  render();
}

    return;
  }

  // 응시자와 분기 기준 시드를 먼저 설정한 뒤 문제를 생성합니다.
  // 진행 중 시험은 저장되어 새로고침 또는 재접속 시 이어서 복구됩니다.
  _examSeed = _strHash(user.employeeId + getCurrentQuarter());

  const questions = generateExamQuestions();
  _examRng = null;

  state.currentExam = {

    quarter: getCurrentQuarter(),
    startedAt: new Date().toISOString(),
    questions,
    answers: Array(questions.length).fill(null),

    warningLogs: [],
    disqualified: false,
    disqualificationReason: "",
    lastViolationAt: 0
  };

function generateExamQuestions() {
  let selected = [];
  Object.entries(examSettings.categoryQuota).forEach(([category, count]) => {
    const pool   = questionBank.filter(q => q.active && q.category === category);
    const picked = (examSettings.randomizeQuestions ? shuffleArray(pool) : [...pool]).slice(0, Number(count));
    selected.push(...picked);
  });
  if (examSettings.randomizeQuestions) selected = shuffleArray(selected);

  return selected.map(question => {
    const indexedOptions     = question.options.map((text, originalIndex) => ({ text, originalIndex }));
    const displayOptions     = examSettings.randomizeOptions ? shuffleArray(indexedOptions) : indexedOptions;
    const correctDisplayIndex = displayOptions.findIndex(option => option.originalIndex === question.answerIndex);
    return {
      questionId: question.id,
      category: question.category,
      difficulty: question.difficulty,
      text: question.text,
      options: displayOptions.map(option => option.text),
      correctDisplayIndex
    };
  });
}

/* ─── 타이머 + 감시 ───────────────────────────── */
function clearTimer() {
  if (state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
}

function startTimer() {
  clearTimer();
  addExamGuards();
  state.timerId = setInterval(() => {
    state.remainingSeconds -= 1;
    if (state.remainingSeconds % 5 === 0) persistCurrentExam(false);
    const timer = document.getElementById("remainingTime");
    if (timer) timer.textContent = formatRemainingTime(state.remainingSeconds);
    if (state.remainingSeconds <= 0) {
      clearTimer();
      submitExam(true, false, "시간 종료로 자동 제출");
    }
  }, 1000);
}

function addExamGuards() {
  window.onbeforeunload = () => "시험이 진행 중입니다. 페이지를 이탈하면 응시 내용이 유실될 수 있습니다.";
  document.addEventListener("visibilitychange", handleVisibilityChange);
  window.addEventListener("blur", handleWindowBlur);
  window.addEventListener("pagehide", handlePageHide);
}

function removeExamGuards() {
  window.onbeforeunload = null;
  document.removeEventListener("visibilitychange", handleVisibilityChange);
  window.removeEventListener("blur", handleWindowBlur);
  window.removeEventListener("pagehide", handlePageHide);
}

function handlePageHide() {
  registerExamExitViolation("pagehide-exit");
}

function handleVisibilityChange() { if (document.hidden) handleTabSwitchViolation("visibilitychange"); }
function handleWindowBlur() {
  setTimeout(() => {
    if (document.hidden) handleTabSwitchViolation("blur-confirmed");
  }, 300);
}

function registerExamExitViolation(source = "exit") {
  if (state.view !== "exam" || !state.currentExam || state.isSubmitting) return;
  const now = Date.now();
  if (now - state.currentExam.lastViolationAt < 900) {
    persistCurrentExam(false);
    return;
  }
  state.currentExam.lastViolationAt = now;
  state.currentExam.tabSwitchCount += 1;
  const count = state.currentExam.tabSwitchCount;
  const createdAt = new Date().toISOString();
  const message = count >= examSettings.tabSwitchLimit
    ? `페이지 이탈 누적 ${count}회: 재접속 시 자동 제출 및 실격 처리됩니다.`
    : `페이지 이탈 ${count}회 감지: 재접속 후 누적됩니다.`;
  state.currentExam.warningLogs.push({ at: createdAt, source, message });
  activityLogs.push({
    logId: nextId(activityLogs, "logId"),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    type: count >= examSettings.tabSwitchLimit ? "DISQUALIFIED" : "WARNING",
    message, tabSwitchCount: count, createdAt
  });
  if (count >= examSettings.tabSwitchLimit) {
    state.currentExam.disqualified = true;
    state.currentExam.disqualificationReason = `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
  }
  persistCurrentExam(false);
}

function handleTabSwitchViolation(source = "unknown") {
  if (state.view !== "exam" || !state.currentExam || state.isSubmitting) return;

  const now = Date.now();
  if (now - state.currentExam.lastViolationAt < 900) return;
  state.currentExam.lastViolationAt = now;

  state.currentExam.tabSwitchCount += 1;
  const count = state.currentExam.tabSwitchCount;
  let message = "";
  if      (count === 1) message = "탭 전환 또는 창 이탈 1회 감지: 경고입니다.";
  else if (count === 2) message = "탭 전환 또는 창 이탈 2회 감지: 마지막 경고입니다.";
  else                  message = `탭 전환 또는 창 이탈 ${count}회 감지: 자동 제출 및 실격 처리됩니다.`;

  const createdAt = new Date().toISOString();
  state.currentExam.warningLogs.push({ at: createdAt, source, message });
  activityLogs.push({
    logId: nextId(activityLogs, "logId"),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    type: count >= examSettings.tabSwitchLimit ? "DISQUALIFIED" : "WARNING",
    message, tabSwitchCount: count, createdAt
  });

  persistCurrentExam();

  const warnBar = document.getElementById("examWarningBar");
  if (warnBar) {
    warnBar.textContent = message;
    warnBar.className   = count >= examSettings.tabSwitchLimit ? "exam-warn-text danger" : "exam-warn-text";
  }
  const countNode = document.getElementById("tabSwitchCount");
  if (countNode) countNode.textContent = `${count}/${examSettings.tabSwitchLimit}`;

  if (count >= examSettings.tabSwitchLimit) {
    state.currentExam.disqualified            = true;
    state.currentExam.disqualificationReason  = `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
    submitExam(true, true, `탭 전환 ${examSettings.tabSwitchLimit}회 이상으로 자동 제출 및 실격`);
  }
}

function formatRemainingTime(seconds) {
  const safe = Math.max(0, seconds);
  const m    = Math.floor(safe / 60);
  const s    = safe % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

/* ─── 채점 & 제출 ─────────────────────────────── */
function calculateScore(exam) {
  const total        = exam.questions.length;
  const correctCount = exam.questions.reduce((sum, question, index) =>
    sum + (exam.answers[index] === question.correctDisplayIndex ? 1 : 0), 0);
  const totalScore       = correctCount * examSettings.pointsPerQuestion;
  const maxScore         = total * examSettings.pointsPerQuestion;
  const percentageScore  = Math.round((totalScore / maxScore) * 100);
  const disqualified     = Boolean(exam.disqualified);
  return {
    correctCount, totalCount: total, totalScore, maxScore, percentageScore,
    score: percentageScore,
    passed: !disqualified && percentageScore >= examSettings.passingScore,
    disqualified
  };
}

function submitExam(isAutoSubmit = false, forceDisqualified = false, submitMessage = "시험 제출 완료") {
  if (!state.currentExam || state.isSubmitting) return;
  state.isSubmitting = true;

  closeModal();
  clearTimer();
  removeExamGuards();

  if (hasAttemptedThisQuarter(state.currentUser.employeeId, state.currentExam.quarter)) {
    alert("이미 제출된 응시 기록이 있습니다.");
    clearActiveExamRecord(state.currentUser.employeeId, state.currentExam.quarter);
    state.currentExam = null;
    state.view        = "candidate";
    state.isSubmitting = false;
    renderCandidateDashboard();
    return;
  }

  if (forceDisqualified) {
    state.currentExam.disqualified           = true;
    state.currentExam.disqualificationReason = state.currentExam.disqualificationReason || `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
  }

  const scoring = calculateScore(state.currentExam);
  const result  = {
    resultId: nextId(examResults, "resultId"),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    quarter: state.currentExam.quarter,
    totalScore: scoring.totalScore,
    maxScore: scoring.maxScore,
    percentageScore: scoring.percentageScore,
    score: scoring.score,
    correctCount: scoring.correctCount,
    totalCount: scoring.totalCount,
    passed: scoring.passed,
    disqualified: scoring.disqualified,
    disqualificationReason: scoring.disqualified
      ? (state.currentExam.disqualificationReason || "운영 정책 위반") : "",
    tabSwitchCount: state.currentExam.tabSwitchCount,
    submittedAt: new Date().toISOString()
  };

  if (result.passed && !result.disqualified) {
    const valid = getCertificationValidity(result);
    result.validFrom = valid.validFrom;
    result.validUntil = valid.validUntil;
  }

  const submitLog = {
    logId: nextId(activityLogs, "logId"),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    type: result.disqualified ? "DISQUALIFIED_SUBMIT" : (isAutoSubmit ? "AUTO_SUBMIT" : "SUBMIT"),
    message: submitMessage,
    tabSwitchCount: result.tabSwitchCount,
    createdAt: result.submittedAt
  };

  examResults.push(result);
  activityLogs.push(submitLog);
  clearActiveExamRecord(state.currentUser.employeeId, state.currentExam.quarter);

  savePersistentData();
  appendResultToSheet(result, submitLog);

  state.lastResult   = result;
  state.currentExam  = null;
  state.view         = "result";
  state.isSubmitting = false;
  renderResultScreen();
}

/* ─── 결과 화면 ───────────────────────────────── */
function renderResultScreen() {
  clearTimer();
  removeExamGuards();
  clearIntroCountdown();
  const result = state.lastResult || getLatestResult(state.currentUser.employeeId);
  if (!result) {
    state.view = "candidate";
    renderCandidateDashboard();
    return;
  }
  const finalLabel = result.disqualified ? "불합격" : (result.passed ? "합격" : "불합격");
  const finalClass = result.passed && !result.disqualified ? "success" : "danger";

  app.innerHTML = `
    ${buildHeader()}
    <main class="container">
      <section class="card result-simple-card" aria-labelledby="resultTitle">
        <h2 id="resultTitle">시험 결과</h2>
        <div class="result-final-badge ${finalClass}" aria-label="최종 결과 ${finalLabel}">${finalLabel}</div>
        <p class="result-thanks">시험 응시하느라 고생하셨습니다. 감사합니다.</p>
        <div class="result-simple-grid">
          <div class="result-simple-metric">
            <div class="label">점수</div>
            <div class="value">${result.percentageScore}점</div>
          </div>
          <div class="result-simple-metric">
            <div class="label">맞힌 개수 / 전체 문제</div>
            <div class="value">${result.correctCount}/${result.totalCount}</div>
          </div>
        </div>
      </section>
    </main>
  `;
}

function getDashboardMetrics() {
  const quarter        = getCurrentQuarter();
  const totalCandidates = getCandidateUsers().length;
  const currentResults = examResults.filter(r => r.quarter === quarter);
  const completed      = new Set(currentResults.map(r => r.employeeId)).size;
  const pending        = totalCandidates - completed;
  const nonDisqualified = currentResults.filter(r => !r.disqualified);
  const avgScore       = currentResults.length
    ? Math.round(currentResults.reduce((sum, r) => sum + r.percentageScore, 0) / currentResults.length) : 0;
  const passRate       = nonDisqualified.length
    ? Math.round((nonDisqualified.filter(r => r.passed).length / nonDisqualified.length) * 100) : 0;
  const disqualifiedCount = currentResults.filter(r => r.disqualified).length;
  return { totalCandidates, completed, pending, avgScore, passRate, disqualifiedCount };
}

/* ─── 공통 차트/뱃지 헬퍼 ─────────────────────── */
function getCategoryCounts() {
  return getCategories().map(category => ({
    category,
    count: questionBank.filter(q => q.category === category && q.active).length
  }));
}

function getScoreDistribution(results) {
  const ranges = [
    { label: "0-59",   min: 0,  max: 59  },
    { label: "60-69",  min: 60, max: 69  },
    { label: "70-79",  min: 70, max: 79  },
    { label: "80-89",  min: 80, max: 89  },
    { label: "90-100", min: 90, max: 100 }
  ];
  return ranges.map(range => ({
    label: range.label,
    value: results.filter(r => r.percentageScore >= range.min && r.percentageScore <= range.max).length
  }));
}

function renderBarChart(items) {
  const max = Math.max(1, ...items.map(item => item.value));
  return `
    <div class="bar-chart">
      ${items.map(item => `
        <div class="bar-row">
          <strong>${escapeHtml(item.label)}</strong>
          <div class="bar-track" aria-label="${escapeHtml(item.label)} ${item.value}">
            <div class="bar-fill" style="width:${Math.round((item.value / max) * 100)}%"></div>
          </div>
          <span class="text-right">${item.value}</span>
        </div>
      `).join("")}
    </div>
  `;
}

function renderResultBadge(result) {
  if (result.disqualified) return `<span class="badge danger">실격</span>`;
  return `<span class="badge ${result.passed ? "success" : "danger"}">${result.passed ? "합격" : "불합격"}</span>`;
}

function filterUsers() {

      const userType     = getAffiliationTypeByDepartment(user.department);

      const matchesKeyword =
        !keyword ||
        keywordMatch(user.department, keyword) ||
        keywordMatch(user.name, keyword) ||
        keywordMatch(user.phone || "", keyword);

      const matchesType =
        state.filters.userType === "전체" ||
        userType === state.filters.userType;

      const matchesDept =
        state.filters.userDepartment === "전체" ||
        user.department === state.filters.userDepartment;

      const matchesStatus =
        state.filters.userStatus === "전체" ||
        (state.filters.userStatus === "응시 완료" && attempted) ||
        (state.filters.userStatus === "미응시" && !attempted && !isExamActive) ||
        (state.filters.userStatus === "응시 중" && isExamActive);

      return matchesKeyword && matchesType && matchesDept && matchesStatus;
    })
    .sort(compareCandidateOrder);
}

function generateEmployeeId() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const prefix = `U-${y}${m}${d}`;
  let seq = users
    .filter(user => String(user.employeeId || "").startsWith(prefix))
    .map(user => Number(String(user.employeeId).split("-").pop()) || 0)
    .reduce((max, value) => Math.max(max, value), 0) + 1;
  let employeeId = `${prefix}-${String(seq).padStart(4, "0")}`;
  while (users.some(user => user.employeeId === employeeId)) {
    seq += 1;
    employeeId = `${prefix}-${String(seq).padStart(4, "0")}`;
  }
  return employeeId;
}

function addUser(event) {
  event.preventDefault();
  const form       = new FormData(event.currentTarget);
  const department = String(form.get("department")).trim();
  const name       = String(form.get("name")).trim();
  const employeeId = generateEmployeeId();

  if (users.some(user => user.role === "candidate" && user.department === department && user.name === name)) {
    alert("같은 부서와 성명의 응시자가 이미 있습니다. 로그인 혼동 방지를 위해 이름 표기를 구분해 주세요.");
    return;
  }
  users.push({ employeeId, department, name, role: "candidate" });
  savePersistentData();
  closeModal();
  renderAdminDashboard();
}

async function resetCandidateRecords(employeeId) {
  const user = users.find(item => item.employeeId === employeeId);
  if (!user) return;

  if (!confirm(`${user.department} ${user.name} 응시자의 시험 결과, 진행 중 시험, 응시 로그를 모두 초기화할까요?\n\n초기화 후 해당 응시자는 다시 처음부터 응시할 수 있습니다.`)) {
    return;
  }

  const btns = document.querySelectorAll(`button[onclick="resetCandidateRecords('${employeeId}')"]`);
  btns.forEach(btn => {
    btn.disabled = true;
    btn.textContent = "초기화 중...";
  });

  try {
    // 1) 서버 권위 데이터에서 먼저 삭제
    if (isAppsScriptRuntime()) {
      await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .resetCandidateRecordsBackend({ employeeId });
      });
    } else if (isExternalApiRuntime()) {
      const res = await callExternalApi("resetCandidateRecords", { employeeId });
      if (res && res.ok === false) {
        throw new Error(res.message || "서버 초기화 실패");
      }
    }

    // 2) 현재 브라우저 메모리에서도 삭제
    examResults = examResults.filter(r => r.employeeId !== employeeId);
    activityLogs = activityLogs.filter(l => l.employeeId !== employeeId);
    activeExams = activeExams.filter(a => {
      const key = a.key || "";
      const examEmployeeId = a.employeeId || a.exam?.employeeId || "";
      return examEmployeeId !== employeeId && !key.startsWith(employeeId + "__");
    });

    // 3) 현재 로그인 사용자가 해당 응시자라면 결과/시험 상태 제거
    if (state.currentUser?.employeeId === employeeId) {
      state.lastResult = null;
      state.currentExam = null;
      state.isSubmitting = false;
      state.view = "candidate";
    }

    // 4) 로컬스토리지에서도 삭제
    clearCandidateLocalCache(employeeId);

    // 5) 서버 최신 데이터 재조회
    if (isAppsScriptRuntime() || isExternalApiRuntime()) {
      await new Promise(resolve => {
        loadRemoteData(() => resolve());
      });
    }

    alert("초기화가 완료되었습니다. 해당 응시자는 다시 응시할 수 있습니다.");

    state.adminSection = "users";
    renderAdminDashboard();

  } catch (e) {
    alert("초기화 중 오류가 발생했습니다: " + e.message);
    btns.forEach(btn => {
      btn.disabled = false;
      btn.textContent = "초기화";
    });
  }
}

  function clearCandidateLocalCache(employeeId) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;

    const localData = JSON.parse(raw);

    if (Array.isArray(localData.examResults)) {
      localData.examResults = localData.examResults.filter(r => r.employeeId !== employeeId);
    }

    if (Array.isArray(localData.activityLogs)) {
      localData.activityLogs = localData.activityLogs.filter(l => l.employeeId !== employeeId);
    }

    if (Array.isArray(localData.activeExams)) {
      localData.activeExams = localData.activeExams.filter(a => {
        const key = a.key || "";
        const examEmployeeId = a.employeeId || a.exam?.employeeId || "";
        return examEmployeeId !== employeeId && !key.startsWith(employeeId + "__");
      });
    }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(localData));
  } catch (e) {
    console.warn("응시자 로컬 캐시 초기화 실패:", e);
  }

  try {
    const sessionRaw = sessionStorage.getItem("HNIRUJA_SESSION");
    if (sessionRaw) {
      const session = JSON.parse(sessionRaw);
      if (session.user?.employeeId === employeeId) {
        session.view = "candidate";
        sessionStorage.setItem("HNIRUJA_SESSION", JSON.stringify(session));
      }
    }
  } catch (e) {
    console.warn("응시자 세션 캐시 초기화 실패:", e);
  }
}

function deleteCandidate(employeeId) {
  const user = users.find(item => item.employeeId === employeeId);
  if (!user) return;
  if (!confirm(`${user.department} ${user.name} 응시자를 삭제할까요? 해당 응시자의 시험 결과와 로그도 함께 삭제됩니다.`)) return;
  users = users.filter(item => item.employeeId !== employeeId);
  examResults = examResults.filter(result => result.employeeId !== employeeId);
  activityLogs = activityLogs.filter(log => log.employeeId !== employeeId);
  if (state.currentUser?.employeeId === employeeId) logout();
  savePersistentData();
  renderAdminDashboard();
}


// ═══ adminAffiliations.js ═══

function renderAffiliationManager() {
  return `
    <section class="card">
      <div class="section-head">
        <div>
          <h2>소속 관리</h2>
        </div>
      </div>

      <form class="affiliation-add-form" onsubmit="addAffiliation(event)">
        <div class="field">
          <label for="newAffiliationName">새 소속명</label>
          <input id="newAffiliationName" name="affiliation" required>
        </div>
        <button class="btn primary" type="submit">소속 추가</button>
      </form>

      <div class="table-wrap" style="margin-top:16px">
        <table>
          <thead><tr><th>현재 선택 가능 소속</th><th>현재 응시자 수</th><th>관리</th></tr></thead>
          <tbody>
            ${managedAffiliations.map(dep => `
              <tr>
                <td>${escapeHtml(dep)}</td>
                <td>${getCandidateUsers().filter(user => user.department === dep).length}명</td>
                <td><button class="btn small danger" type="button" onclick="removeAffiliation('${escapeHtml(dep)}')">목록에서 제거</button></td>
              </tr>
            `).join("") || `<tr><td colspan="3" class="empty">등록된 소속이 없습니다.</td></tr>`}
          </tbody>
        </table>
      </div>
    </section>
  `;
}

function addAffiliation(event) {
  event.preventDefault();
  const form = new FormData(event.currentTarget);
  const name = String(form.get("affiliation") || "").trim();
  if (!name) return;
  if (managedAffiliations.includes(name)) {
    alert("이미 등록된 소속입니다.");
    return;
  }
  managedAffiliations.push(name);
  managedAffiliations.sort();
  savePersistentData();
  renderAdminDashboard();
}

function removeAffiliation(name) {
  if (!confirm(`${name} 소속을 선택 목록에서 제거할까요? 기존 응시자 기록의 소속 데이터는 유지됩니다.`)) return;
  managedAffiliations = managedAffiliations.filter(dep => dep !== name);
  savePersistentData();
  renderAdminDashboard();
}

// 책임: 문제은행 목록, 추가/수정/비활성화 모달

function renderQuestionManager() {
  const categoryCounts = getCategoryCounts();
  return `
    <section class="card">
      <div class="section-head">
        <div>
          <h2>문제은행 관리</h2>
        </div>
        <button class="btn primary" type="button" onclick="openQuestionModal()">문제 추가</button>
      </div>

      ${getQuotaWarnings().length ? `<div class="notice danger">${getQuotaWarnings().map(escapeHtml).join("<br>")}</div><br>` : ""}

      <div class="grid three">
        ${categoryCounts.map(item => `
          <div class="metric">
            <div class="label">${escapeHtml(item.category)}</div>
            <div class="value">${item.count}</div>
            <div class="sub">활성 문항</div>
          </div>
        `).join("")}
      </div>

      <br>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>카테고리</th><th>문제 문장</th><th>정답</th><th>상태</th><th>관리</th></tr>
          </thead>
          <tbody>
            ${questionBank.map(q => `
              <tr>
                <td>${q.id}</td>
                <td>${escapeHtml(q.category)}</td>
                <td>${escapeHtml(q.text)}</td>
                <td>${Number(q.answerIndex) + 1}번</td>
                <td><span class="badge ${q.active ? "success" : "danger"}">${q.active ? "사용" : "비활성"}</span></td>
                <td>
                  <button class="btn small" type="button" onclick="openQuestionModal(${q.id})">수정</button>
                  <button class="btn small" type="button" onclick="toggleQuestionStatus(${q.id})">${q.active ? "비활성" : "활성"}</button>
                  <button class="btn small danger" type="button" onclick="deleteQuestion(${q.id})">삭제</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </section>
  `;
}

function openQuestionModal(questionId = null) {
  const q = questionBank.find(item => item.id === questionId) || {
    id: "", category: "안전보건",
    text: "", options: ["", "", "", "", ""], answerIndex: 0, active: true
  };

  modalRoot.innerHTML = `
    <div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="questionModalTitle">
      <section class="modal">
        <h2 id="questionModalTitle">${questionId ? "문제 수정" : "문제 추가"}</h2>
        <form class="question-form" onsubmit="${questionId ? `updateQuestion(event, ${questionId})` : "addQuestion(event)"}">
          <div class="field">
            <label for="qCategory">카테고리</label>
            <input id="qCategory" name="category" required value="${escapeHtml(q.category)}">
          </div>
          <div class="field">
            <label for="qText">문제 문장</label>
            <textarea id="qText" name="text" required>${escapeHtml(q.text)}</textarea>
          </div>
          ${[0, 1, 2, 3, 4].map(i => `
            <div class="field option-field">
              <div class="option-answer-row">
                <label class="answer-choice" for="qAnswer${i}" aria-label="${i + 1}번을 정답으로 선택">
                  <input id="qAnswer${i}" name="answerIndex" type="radio" value="${i}" required ${Number(q.answerIndex) === i ? "checked" : ""}>
                  <span>${i + 1}</span>
                </label>
                <input id="qOption${i}" name="option${i}" required
                  value="${escapeHtml(q.options[i] || "")}">
              </div>
            </div>
          `).join("")}
          <div class="field">
            <label for="qActive">사용 여부</label>
            <select id="qActive" name="active">
              ${optionHtml("true",  String(q.active), "사용")}
              ${optionHtml("false", String(q.active), "비활성")}
            </select>
          </div>
          <div class="modal-actions">
            <button class="btn" type="button" onclick="closeModal()">취소</button>
            <button class="btn primary" type="submit">저장</button>
          </div>
        </form>
      </section>
    </div>
  `;
  setTimeout(() => document.getElementById("qCategory")?.focus(), 0);
}

function readQuestionForm(event) {
  const form = new FormData(event.currentTarget);
  const answerIndexRaw = form.get("answerIndex");
  if (answerIndexRaw === null) {
    alert("정답으로 사용할 번호를 1개 선택해 주세요.");
    return null;
  }
  return {
    category:    String(form.get("category")).trim(),
    difficulty:  "기본",
    text:        String(form.get("text")).trim(),
    options:     [0, 1, 2, 3, 4].map(i => String(form.get(`option${i}`)).trim()),
    answerIndex: Number(answerIndexRaw),
    active:      String(form.get("active")) === "true"
  };
}

function addQuestion(event) {
  event.preventDefault();
  const data = readQuestionForm(event);
  if (!data) return;
  questionBank.push({ id: nextId(questionBank, "id"), ...data });
  savePersistentData();
  closeModal();
  renderAdminDashboard();
}

function updateQuestion(event, id) {
  event.preventDefault();
  const data = readQuestionForm(event);
  if (!data) return;
  questionBank = questionBank.map(q => q.id === id ? { ...q, ...data } : q);
  savePersistentData();
  closeModal();
  renderAdminDashboard();
}

function toggleQuestionStatus(id) {
  questionBank = questionBank.map(q => q.id === id ? { ...q, active: !q.active } : q);
  savePersistentData();
  renderAdminDashboard();
}

function deleteQuestion(id) {
  const q = questionBank.find(item => item.id === id);
  if (!q) return;
  if (!confirm("선택한 문제를 삭제할까요?")) return;
  questionBank = questionBank.filter(item => item.id !== id);
  savePersistentData();
  renderAdminDashboard();
}

// 책임: 시험 설정 폼 렌더 및 즉시 반영

function renderSettingsManager() {
  const allCategories = getCategories();
  return `
    <section class="card">
      <div class="section-head">
        <div>
          <h2>시험 설정</h2>
        </div>
      </div>

      ${getQuotaWarnings().length ? `<div class="notice danger">${getQuotaWarnings().map(escapeHtml).join("<br>")}</div><br>` : ""}

      <form onchange="updateExamSettings(event)">
        <div class="grid three">
          <div class="field">
            <label for="settingTotal">분기별 출제 문항 수</label>
            <input id="settingTotal" name="totalQuestions" type="number" min="1" value="${examSettings.totalQuestions}" readonly>
          </div>
          <div class="field">
            <label for="settingTime">제한 시간(분)</label>
            <input id="settingTime" name="timeLimitMinutes" type="number" min="1" value="${examSettings.timeLimitMinutes}">
          </div>
          <div class="field">
            <label for="settingPass">합격 기준 점수</label>
            <input id="settingPass" name="passingScore" type="number" min="0" max="100" value="${examSettings.passingScore}">
          </div>
          <div class="field">
            <label for="settingTabLimit">탭 전환 허용 횟수</label>
            <input id="settingTabLimit" name="tabSwitchLimit" type="number" min="1" value="${examSettings.tabSwitchLimit}">
          </div>
          <div class="field">
            <label for="settingQuestionRandom">문제 랜덤 여부</label>
            <select id="settingQuestionRandom" name="randomizeQuestions">
              ${optionHtml("true",  String(examSettings.randomizeQuestions), "ON")}
              ${optionHtml("false", String(examSettings.randomizeQuestions), "OFF")}
            </select>
          </div>
          <div class="field">
            <label for="settingOptionRandom">보기 랜덤 여부</label>
            <select id="settingOptionRandom" name="randomizeOptions">
              ${optionHtml("true",  String(examSettings.randomizeOptions), "ON")}
              ${optionHtml("false", String(examSettings.randomizeOptions), "OFF")}
            </select>
          </div>
        </div>

        <hr style="border:0;border-top:1px solid var(--line);margin:18px 0">

        <h3>카테고리별 출제 수</h3>
        <div class="grid three">
          ${allCategories.map(category => `
            <div class="field">
              <label for="quota_${escapeHtml(category)}">${escapeHtml(category)}</label>
              <input id="quota_${escapeHtml(category)}" name="quota:${escapeHtml(category)}"
                type="number" min="0" value="${examSettings.categoryQuota[category] ?? 0}">
            </div>
          `).join("")}
        </div>
      </form>

      <div class="notice" style="margin-top:14px">
        현재 카테고리별 출제 수 합계는
        <strong>${Object.values(examSettings.categoryQuota).reduce((a, b) => a + Number(b), 0)}</strong>문항입니다.
        분기별 출제 문항 수는 카테고리별 출제 수 합계로 자동 계산됩니다.
      </div>
    </section>
  `;
}

function updateExamSettings(event) {
  const target = event.target;
  if (!target.name) return;

  if (target.name.startsWith("quota:")) {
    const category = target.name.replace("quota:", "");
    examSettings.categoryQuota[category] = Math.max(0, Number(target.value || 0));
  } else if (target.name === "randomizeQuestions" || target.name === "randomizeOptions") {
    examSettings[target.name] = target.value === "true";
  } else if (target.name !== "totalQuestions") {
    examSettings[target.name] = Math.max(1, Number(target.value || 1));
  }

  examSettings.totalQuestions = Object.values(examSettings.categoryQuota).reduce((a, b) => a + Number(b), 0);
  savePersistentData();
  renderAdminDashboard();
}

// 책임: 응시 결과 목록, 필터, 정렬

function renderResultsManager() {
  const rows     = filterResults();
  const quarters = [...new Set(examResults.map(r => r.quarter))].sort().reverse();
  const grouped = rows.reduce((acc, row) => {
    const key = row.quarter || "분기 미지정";
    if (!acc[key]) acc[key] = [];
    acc[key].push(row);
    return acc;
  }, {});
  const visibleQuarters = Object.keys(grouped).sort().reverse();

  return `
    <section class="card">
      <div class="section-head">
        <div>
          <h2>결과 관리</h2>
        </div>
      </div>

      <div class="filters">
        <div class="field">
          <label for="resultDepartment">소속</label>
          <select id="resultDepartment" onchange="state.filters.resultDepartment=this.value; renderAdminDashboard();">
            ${optionHtml("전체", state.filters.resultDepartment)}
            ${getDepartments().map(dep => optionHtml(dep, state.filters.resultDepartment)).join("")}
          </select>
        </div>
        <div class="field">
          <label for="resultQuarter">분기</label>
          <select id="resultQuarter" onchange="state.filters.resultQuarter=this.value; renderAdminDashboard();">
            ${optionHtml("전체", state.filters.resultQuarter)}
            ${quarters.map(q => optionHtml(q, state.filters.resultQuarter)).join("")}
          </select>
        </div>
        <div class="field">
          <label for="resultDisqualified">실격 여부</label>
          <select id="resultDisqualified" onchange="state.filters.resultDisqualified=this.value; renderAdminDashboard();">
            ${["전체", "실격", "정상"].map(v => optionHtml(v, state.filters.resultDisqualified)).join("")}
          </select>
        </div>
        <div class="field">
          <label for="resultSort">정렬</label>
          <select id="resultSort" onchange="state.filters.resultSort=this.value; renderAdminDashboard();">
            ${optionHtml("dateDesc",  state.filters.resultSort, "최신순")}
            ${optionHtml("scoreDesc", state.filters.resultSort, "점수 높은 순")}
            ${optionHtml("scoreAsc",  state.filters.resultSort, "점수 낮은 순")}
          </select>
        </div>
        <button class="btn" type="button" onclick="resetResultFilters()">초기화</button>
      </div>

      ${visibleQuarters.map(quarter => `
        <section class="quarter-result-block">
          <div class="quarter-title">
            <h3>${escapeHtml(quarter)}</h3>
            <span class="badge">${grouped[quarter].length}건</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>응시일시</th><th>소속</th><th>성명</th><th>정답</th><th>점수</th><th>최종 상태</th><th>자격 유효기간</th><th>탭 전환</th></tr>
              </thead>
              <tbody>
                ${grouped[quarter].map(r => `
                  <tr>
                    <td>${formatDateTime(r.submittedAt)}</td>
                    <td>${escapeHtml(r.department)}</td>
                    <td>${escapeHtml(r.name)}</td>
                    <td>${r.correctCount}/${r.totalCount}</td>
                    <td>${r.percentageScore}점</td>
                    <td>${renderResultBadge(r)}${r.disqualificationReason ? `<br><span class="muted">${escapeHtml(r.disqualificationReason)}</span>` : ""}</td>
                    <td>${getCertificationValidity(r) ? `${formatDateOnly(getCertificationValidity(r).validFrom)} ~ ${formatDateOnly(getCertificationValidity(r).validUntil)}` : "-"}</td>
                    <td>${r.tabSwitchCount ?? 0}회</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `).join("") || `<div class="empty">조건에 맞는 결과가 없습니다.</div>`}
    </section>
  `;
}

function filterResults() {
  let rows = examResults.filter(r => {
    const depOk  = state.filters.resultDepartment === "전체" || r.department === state.filters.resultDepartment;
    const qOk    = state.filters.resultQuarter    === "전체" || r.quarter    === state.filters.resultQuarter;
    const disqOk = state.filters.resultDisqualified === "전체" ||
      (state.filters.resultDisqualified === "실격" &&  r.disqualified) ||
      (state.filters.resultDisqualified === "정상" && !r.disqualified);
    return depOk && qOk && disqOk;
  });

  if      (state.filters.resultSort === "scoreDesc") rows.sort((a, b) => b.percentageScore - a.percentageScore);
  else if (state.filters.resultSort === "scoreAsc")  rows.sort((a, b) => a.percentageScore - b.percentageScore);
  else                                               rows.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));
  return rows;
}

function resetResultFilters() {
  state.filters.resultDepartment   = "전체";
  state.filters.resultQuarter      = "전체";
  state.filters.resultSort         = "dateDesc";
  state.filters.resultDisqualified = "전체";
  renderAdminDashboard();
}

// ═══ adminStats.js ═══

// 책임: 통계 시각화 (점수 분포, 부서별 평균, 합격 비율, 카테고리 문항 수)

function renderStatsManager() {
  const currentResults = examResults.filter(r => r.quarter === getCurrentQuarter());
  const scoreDist      = getScoreDistribution(examResults);
  const categoryCounts = getCategoryCounts().map(item => ({ label: item.category, value: item.count }));
  const statusRatio    = [
    { label: "합격",   value: examResults.filter(r =>  r.passed && !r.disqualified).length },
    { label: "불합격", value: examResults.filter(r => !r.passed && !r.disqualified).length },
    { label: "실격",   value: examResults.filter(r =>  r.disqualified).length }
  ];
  const deptAvg = getDepartments().map(dep => {
    const rows = examResults.filter(r => r.department === dep);
    const avg  = rows.length ? Math.round(rows.reduce((sum, r) => sum + r.percentageScore, 0) / rows.length) : 0;
    return { label: dep, value: avg };
  });

  return `
    <section class="section-head">
      <div>
        <h2>통계 시각화</h2>
      </div>
    </section>

    <div class="grid two">
      <section class="card">
        <div class="section-head"><h3>점수 분포 바 차트</h3></div>
        ${renderBarChart(scoreDist)}
      </section>
      <section class="card">
        <div class="section-head"><h3>부서별 평균 점수</h3></div>
        ${renderBarChart(deptAvg)}
      </section>
      <section class="card">
        <div class="section-head"><h3>합격/불합격/실격 비율</h3></div>
        ${renderBarChart(statusRatio)}
      </section>
      <section class="card">
        <div class="section-head"><h3>카테고리별 문항 수</h3></div>
        ${renderBarChart(categoryCounts)}
      </section>
    </div>

    <section class="card" style="margin-top:16px">
      <div class="section-head"><h3>이번 분기 요약</h3></div>
      <div class="grid three">
        <div class="metric"><div class="label">이번 분기 결과 수</div><div class="value">${currentResults.length}</div></div>
        <div class="metric"><div class="label">최고 점수</div><div class="value">${currentResults.length ? Math.max(...currentResults.map(r => r.percentageScore)) : 0}</div></div>
        <div class="metric"><div class="label">실격자</div><div class="value">${currentResults.filter(r => r.disqualified).length}</div></div>
      </div>
    </section>
  `;
}
